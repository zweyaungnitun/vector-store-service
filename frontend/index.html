<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Ingestion Portal | Premium HR AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header class="fade-in">
            <h1>Vector Ingestor</h1>
            <p class="subtitle">Next-Generation Semantic Knowledge Engine</p>
        </header>

        <div class="glass-card fade-in">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('file-tab')">📂 File Upload</button>
                <button class="tab-btn" onclick="switchTab('text-tab')">📝 Raw Text</button>
            </div>

            <!-- File Upload Section -->
            <div id="file-tab" class="ingest-section active">
                <div class="upload-zone" id="drop-zone">
                    <span class="upload-icon">🚀</span>
                    <p class="upload-text">Drop your files here or click to browse</p>
                    <p class="upload-hint">Supports PDF, Excel, CSV, TXT</p>
                    <input type="file" id="file-input" multiple>
                </div>

                <div class="controls">
                    <div class="select-wrapper">
                        <select id="target-type">
                            <option value="knowledge">Target: General Knowledge (PDF/TXT)</option>
                            <option value="excel">Target: Generic Excel/CSV Data</option>
                            <option value="resume">Target: HR Resumes (Candidates)</option>
                            <option value="job">Target: HR Job Postings</option>
                            <option value="skill">Target: HR Skills Matrix</option>
                        </select>
                    </div>
                    <button class="btn-primary" id="upload-btn" disabled>Ingest Files</button>
                </div>
            </div>

            <!-- Raw Text Section -->
            <div id="text-tab" class="ingest-section">
                <textarea id="raw-text" placeholder="Paste your raw text knowledge here..."></textarea>
                <div class="controls">
                    <div class="select-wrapper">
                        <select id="text-target-type">
                            <option value="knowledge">Collection: General Knowledge</option>
                            <option value="skill">Collection: Skills Matrix</option>
                            <option value="job">Collection: Job Postings</option>
                        </select>
                    </div>
                    <button class="btn-primary" id="text-ingest-btn">Ingest Text</button>
                </div>
            </div>

            <div class="progress-container" id="progress-container">
                <div class="progress-fill" id="progress-bar"></div>
            </div>

            <div class="status-container">
                <div id="file-list" class="file-list"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
